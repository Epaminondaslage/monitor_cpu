<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Servidor 10.0.0.139 - Monitor Profissional</title>

<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Gauge.js -->
<script src="https://cdn.jsdelivr.net/npm/gaugeJS/dist/gauge.min.js"></script>

<style>
/* Ajuste para gauges */
.gauge-container{
    text-align:center;
}

.gauge-container canvas{
    max-width:260px;
    margin:auto;
}

.indicator{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
    color:#2563eb;
}
</style>

</head>

<body>

<h1>Dashboard Servidor 10.0.0.139</h1>

<div id="alert"></div>

<div class="grid">

<!-- CPU GAUGE -->
<div class="card gauge-container">
<h3>CPU Total</h3>
<canvas id="cpuGauge" width="260" height="160"></canvas>
<div id="cpuText" class="indicator"></div>
</div>

<!-- TEMP GAUGE -->
<div class="card gauge-container">
<h3>Temperatura SoC</h3>
<canvas id="tempGauge" width="260" height="160"></canvas>
<div id="tempText" class="indicator"></div>
</div>

<!-- LOAD -->
<div class="card">
<h3>Load Average</h3>
<canvas id="loadChart"></canvas>
</div>

<!-- FRIGATE -->
<div class="card">
<h3>Frigate CPU (%)</h3>
<canvas id="frigateChart"></canvas>
</div>

<!-- DISK IO -->
<div class="card">
<h3>Disk IO</h3>
<canvas id="diskChart"></canvas>
</div>

<!-- CPU CORE -->
<div class="card">
<h3>CPU por Core</h3>
<canvas id="coreChart"></canvas>
</div>

<!-- RAM -->
<div class="card">
<h3>RAM</h3>
<div id="ram" class="indicator"></div>
</div>

</div>

<script>

/* ============================
   GAUGE CPU
============================ */

const cpuGauge = new Gauge(
document.getElementById("cpuGauge")
).setOptions({

angle:0,
lineWidth:0.25,
radiusScale:0.9,

pointer:{
length:0.6,
strokeWidth:0.04,
color:"#000"
},

staticZones:[
{strokeStyle:"#22c55e",min:0,max:50},
{strokeStyle:"#facc15",min:50,max:80},
{strokeStyle:"#ef4444",min:80,max:100}
],

limitMax:false

});

cpuGauge.maxValue = 100;
cpuGauge.setMinValue(0);
cpuGauge.set(0);


/* ============================
   GAUGE TEMPERATURA
============================ */

const tempGauge = new Gauge(
document.getElementById("tempGauge")
).setOptions({

angle:0,
lineWidth:0.25,
radiusScale:0.9,

pointer:{
length:0.6,
strokeWidth:0.04,
color:"#000"
},

staticZones:[
{strokeStyle:"#22c55e",min:0,max:60},
{strokeStyle:"#facc15",min:60,max:75},
{strokeStyle:"#ef4444",min:75,max:100}
]

});

tempGauge.maxValue = 100;
tempGauge.setMinValue(0);
tempGauge.set(0);


/* ============================
   CHARTS
============================ */

function createLineChart(ctx,label,color,maxY=100){

return new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
label:label,
data:[],
borderColor:color,
backgroundColor:color,
fill:false,
tension:0.2
}]
},
options:{
animation:false,
responsive:true,
scales:{ y:{ min:0,max:maxY } }
}
});

}

const loadChart = createLineChart(
document.getElementById('loadChart'),
'Load','#ef4444',8
);

const frigateChart = createLineChart(
document.getElementById('frigateChart'),
'Frigate CPU','#22c55e',200
);


const diskChart = new Chart(
document.getElementById('diskChart'),
{
type:'line',
data:{
labels:[],
datasets:[
{label:'Read',data:[],borderColor:'#facc15',fill:false},
{label:'Write',data:[],borderColor:'#ef4444',fill:false}
]
},
options:{animation:false}
}
);


const coreChart = new Chart(
document.getElementById('coreChart'),
{
type:'bar',
data:{
labels:[],
datasets:[{
label:'Uso %',
data:[],
backgroundColor:[]
}]
},
options:{
animation:false,
scales:{ y:{ min:0,max:100 } }
}
}
);


/* ============================
   ADD DATA
============================ */

function addData(chart,value){

const now = new Date().toLocaleTimeString();

chart.data.labels.push(now);
chart.data.datasets[0].data.push(value);

if(chart.data.labels.length > 30){

chart.data.labels.shift();
chart.data.datasets[0].data.shift();

}

chart.update();

}


/* ============================
   UPDATE
============================ */

function update(){

fetch('/monitor-cpu/api.php')
.then(r=>r.json())
.then(data=>{

/* CPU */
cpuGauge.set(data.cpu);
document.getElementById('cpuText').innerText =
data.cpu + " %";

/* TEMP */
tempGauge.set(data.temp);
document.getElementById('tempText').innerText =
data.temp + " °C";

/* LOAD */
addData(loadChart,data.load);

/* FRIGATE */
addData(frigateChart,data.frigate_cpu);

/* DISK */

const now = new Date().toLocaleTimeString();

diskChart.data.labels.push(now);

diskChart.data.datasets[0].data.push(data.disk_read);
diskChart.data.datasets[1].data.push(data.disk_write);

if(diskChart.data.labels.length > 30){

diskChart.data.labels.shift();
diskChart.data.datasets[0].data.shift();
diskChart.data.datasets[1].data.shift();

}

diskChart.update();


/* CORES */

if(data.cores){

coreChart.data.labels = Object.keys(data.cores);

coreChart.data.datasets[0].data =
Object.values(data.cores);

coreChart.data.datasets[0].backgroundColor =
Object.keys(data.cores).map(c =>
(c==6||c==7)?'#22c55e':'#6366f1'
);

coreChart.update();

}


/* RAM */

document.getElementById('ram').innerText =
"RAM: " + data.ram_used + " MB / " +
data.ram_total + " MB";


/* ALERT */

document.getElementById('alert').innerHTML =
(data.load > 5)
? "<div class='alert'>ALERTA: LOAD ALTO!</div>"
: "";

});

}


/* LOOP */

setInterval(update,3000);

update();

</script>

</body>
</html>
```
